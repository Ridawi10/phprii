<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام الأقساط | لوحة التحكم</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- زر فتح القائمة (موبايل) -->
<button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

<!-- طبقة تعتيم موبايل -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="app-wrapper">

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar" id="sidebar">

    <!-- شعار -->
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">💎</div>
      <div>
        <div class="sidebar-logo-title">نظام الأقساط</div>
        <div class="sidebar-logo-sub">إدارة متكاملة للأقساط</div>
      </div>
    </div>

    <!-- قائمة التنقل -->
    <nav class="sidebar-nav">

      <div class="nav-group-label">القائمة الرئيسية</div>

      <div class="nav-item active" data-page="page-dashboard" onclick="navigateTo('page-dashboard')">
        <div class="nav-item-icon">🏠</div>
        <span class="nav-item-text">لوحة التحكم</span>
      </div>

      <div class="nav-item" data-page="page-add" onclick="navigateTo('page-add')">
        <div class="nav-item-icon">➕</div>
        <span class="nav-item-text">إضافة قسط</span>
      </div>

      <div class="nav-item" data-page="page-payments" onclick="navigateTo('page-payments')">
        <div class="nav-item-icon">💳</div>
        <span class="nav-item-text">التسديد</span>
      </div>

      <div class="nav-group-label" style="margin-top:8px">المتابعة</div>

      <div class="nav-item" data-page="page-reports" onclick="navigateTo('page-reports')">
        <div class="nav-item-icon">📊</div>
        <span class="nav-item-text">التقارير</span>
      </div>

      <div class="nav-item" data-page="page-reminders" onclick="navigateTo('page-reminders')">
        <div class="nav-item-icon">🔔</div>
        <span class="nav-item-text">التذكير</span>
        <span class="nav-badge" id="reminder-badge" style="display:none">0</span>
      </div>

      <div class="nav-group-label" style="margin-top:8px">الإدارة</div>

      <div class="nav-item" data-page="page-activation" onclick="navigateTo('page-activation')">
        <div class="nav-item-icon">🔑</div>
        <span class="nav-item-text">التفعيل والحسابات</span>
      </div>

    </nav>

    <!-- أسفل الشريط -->
    <div class="sidebar-footer">
      <div class="db-status-pill">
        <span class="db-dot"></span>
        <span>قاعدة البيانات متصلة</span>
      </div>
      <a href="landing.html" class="back-to-landing">
        <span>🌐</span>
        <span>الواجهة الرئيسية</span>
      </a>
    </div>

  </aside>
  <!-- ========== END SIDEBAR ========== -->


  <!-- ========== MAIN ========== -->
  <main class="main-content" id="main-content">

    <!-- شريط علوي -->
    <header class="topbar">
      <div class="topbar-right">
        <div class="topbar-page-info">
          <h2 id="topbar-page-title">لوحة التحكم</h2>
          <p id="topbar-page-sub">نظرة عامة على النظام</p>
        </div>
      </div>
      <div class="topbar-left">
        <div class="topbar-time" id="current-time">--:--</div>
        <button class="topbar-action-btn" onclick="navigateTo('page-add')">
          <span>➕</span>
          <span>قسط جديد</span>
        </button>
      </div>
    </header>

    <!-- محتوى الصفحات -->
    <div class="page-content">
      <div id="page-dashboard" class="page-section">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>جاري التحميل...</p>
        </div>
      </div>
      <div id="page-add"        class="page-section hidden"></div>
      <div id="page-payments"   class="page-section hidden"></div>
      <div id="page-reports"    class="page-section hidden"></div>
      <div id="page-reminders"  class="page-section hidden"></div>
      <div id="page-activation" class="page-section hidden"></div>
    </div>

  </main>
  <!-- ========== END MAIN ========== -->

</div>

<!-- حاوية الإشعارات -->
<div id="toast-container"></div>

<!-- ========== SCRIPTS ========== -->
<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script src="js/page-add.js"></script>
<script src="js/page-payments.js"></script>
<script src="js/page-reports.js"></script>
<script src="js/page-reminders.js"></script>
<script src="js/page-activation.js"></script>
<script src="js/app.js"></script>

<script>
  /* ---- تحديث الوقت ---- */
  function updateTime() {
    const el = document.getElementById('current-time');
    if (el) {
      const now = new Date();
      el.textContent = now.toLocaleTimeString('ar-IQ', { hour: '2-digit', minute: '2-digit' });
    }
  }
  updateTime();
  setInterval(updateTime, 10000);

  /* ---- موبايل: فتح/إغلاق ---- */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  }

  /* ---- Escape يغلق الـ modals ---- */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape')
      document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
  });

  /* ---- نقرة خارج الـ modal ---- */
  document.addEventListener('click', e => {
    if (e.target.classList.contains('modal-overlay'))
      e.target.classList.remove('active');
  });
</script>

</body>
</html>
